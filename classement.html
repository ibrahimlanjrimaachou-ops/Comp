<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classement - Basket Contest</title>
</head>
<body>
  <!-- Titre principal de la page -->
  <header>
    <h1>Classement</h1>
    <p>Consultez les resultats des equipes participantes.</p>
  </header>
<!--idée : faire un classement par age (u17 u20 etc...)-->
  <main>
    <!-- Un tableau suffit pour un projet simple -->
    <section>
      <h2>Classement general</h2>
      <table border="1">
        <thead>
          <tr>
            <th>Position</th>
            <th>Equipe</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Lions</td>
            <td>12</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Tigers</td>
            <td>10</td>
          </tr>
          <tr>
            <td>3</td>
            <td>Eagles</td>
            <td>8</td>
          </tr>
          <tr>
            <td>4</td>
            <td>Bulls</td>
            <td>6</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>Classement mis a jour apres chaque competition.</p>
  </footer>
</body>
</html>
