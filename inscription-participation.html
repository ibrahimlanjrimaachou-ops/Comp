<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription - Compétition de Basket</title>
</head>
<body>
  <!-- Presentation de la page d'inscription -->
  <header>
    <h1>Inscription à la prochaine compétition</h1>
    <p>Rejoignez la compétition et faites partie des meilleures équipes. Inscrivez-vous dès maintenant pour participer aux matchs et tenter de décrocher le titre.</p>
  </header>


  <main>
    
    <!-- Formulaire HTML basique pour le moment -->
    <section>
      <img src="images/image-inscription.jpg" width="30%" height="30%" alt="Photo d'un panier de basket">
      <h2>Formulaire d'inscription</h2>
      <form action="#" method="post">
        <p>
          <label for="nom">Nom de l'équipe :</label><br>
          <input type="text" id="nom">
        </p>

        <p>
          <label for="email">Email :</label><br>
          <input type="email" id="email">
        </p>

        <p>
          <label for="telephone">Numéro de téléphone :</label><br>
          <input type="tel" id="telephone">
        </p>
        <p>
          <label for="nombre-joueurs">Nombre de Joueurs dans l'équipe</label><br>
          <input type="number" id="nombre-joueurs">
        </p>
        <p>
          <label for="pays-ville">Pays ou Ville representé :</label><br>
          <input type="text" id="pays-ville">
        </p>

        <p>
          <label for="message">Message :</label><br>
          <textarea id="message" rows="5" cols="30"></textarea>
        </p>

        <p>
          <button type="submit">Envoyer</button>
        </p>
      </form>
    </section>
    <section> 
      <h2></h2>
    </section>
  </main>
</body>
</html>
